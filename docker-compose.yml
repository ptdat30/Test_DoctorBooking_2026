# ══════════════════════════════════════════════════════════════
# docker-compose.yml — DoctorBooking Base Configuration
#
# This is the BASE config. Use with environment-specific overrides:
#   Staging:    docker compose -f docker-compose.yml -f docker-compose.staging.yml up
#   Production: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#   Local dev:  docker compose --profile local-db up
#
# Features:
#  - Isolated networks (frontend-net, backend-net)
#  - Docker Secrets (no hardcoded passwords)
#  - Healthchecks with proper start-period
#  - Depends-on with condition: service_healthy
#  - restart: unless-stopped
#  - Profile "local-db" for local MySQL
#  - Named volume for MySQL data persistence
# ══════════════════════════════════════════════════════════════

name: doctorbooking

# ── Secrets (file-based, never in environment) ─────────────────
secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  google_ai_api_key:
    file: ./secrets/google_ai_api_key.txt
  groq_api_key:
    file: ./secrets/groq_api_key.txt
  smtp_password:
    file: ./secrets/smtp_password.txt
  vnpay_hash_secret:
    file: ./secrets/vnpay_hash_secret.txt

# ── Networks (isolated) ────────────────────────────────────────
networks:
  frontend-net:
    driver: bridge
    name: doctorbooking_frontend
  backend-net:
    driver: bridge
    name: doctorbooking_backend
    internal: true      # DB network: no external access

# ── Volumes ────────────────────────────────────────────────────
volumes:
  db_data:
    name: doctorbooking_db_data

# ══════════════════════════════════════════════════════════════
# Services
# ══════════════════════════════════════════════════════════════
services:

  # ── MySQL (local-db profile only) ──────────────────────────
  db:
    profiles: [local-db]
    image: mysql:8.0-debian
    container_name: doctorbooking-db
    restart: unless-stopped
    networks:
      - backend-net
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: doctor_booking
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_USER: appuser
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root",
             "--password=$$(cat /run/secrets/db_password)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    # Ports exposed for local development
    ports:
      - "3306:3306"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE

  # ── Backend (Spring Boot 3.5 / Java 21) ────────────────────
  # Note: env_file and environment overrides are in
  # docker-compose.staging.yml / docker-compose.prod.yml
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doctorbooking-backend
    restart: unless-stopped
    networks:
      - frontend-net
      - backend-net
    depends_on:
      db:
        condition: service_healthy
    secrets:
      - db_password
      - jwt_secret
      - google_ai_api_key
      - groq_api_key
      - smtp_password
      - google_ai_api_key
      - vnpay_hash_secret
    environment:
      - DB_URL=jdbc:mysql://doctorbooking-db:3306/doctor_booking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - DB_USERNAME=root
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USERNAME=your_email@gmail.com
      - SMTP_PASSWORD_FILE=/run/secrets/smtp_password
      - JWT_EXPIRATION=86400000
      - JWT_REFRESH_EXPIRATION=604800000
      - FRONTEND_URL=http://localhost:5173
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      - EMAIL_FROM=noreply@doctorbooking.com
      - VNPAY_TMN_CODE=YOUR_TMN_CODE
      - VNPAY_URL=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - VNPAY_RETURN_URL=http://localhost:5173/payment/return
      - VNPAY_APPOINTMENT_RETURN_URL=http://localhost:5173/appointment/payment-return
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/liveness || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: false              # Spring needs /tmp write access
    tmpfs:
      - /tmp:size=256m,noexec,nosuid
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        labels: "service=backend"

  # ── Frontend (React + Nginx Unprivileged) ───────────────────
  # Note: ports and VITE_API_TARGET are in environment overrides
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    environment:
      - VITE_API_TARGET=http://doctorbooking-backend:8080
    container_name: doctorbooking-frontend
    restart: unless-stopped
    networks:
      - frontend-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "--tries=1", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Non-root nginx (UID 101) is sufficient; read_only breaks nginx template rendering
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=frontend"
