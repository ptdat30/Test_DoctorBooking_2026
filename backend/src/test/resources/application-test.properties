# Test Configuration - Override main properties with mock values
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=

# H2 Database
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Disable SMTP for tests
spring.mail.host=localhost
spring.mail.port=25

# Test JWT
jwt.secret=test-secret-key-for-testing-purposes-only-minimum-256-bits
jwt.expiration=3600000
jwt.expiration.refresh=86400000

# Test Groq
groq.api-key=test-key

# Test VNPAY
vnpay.tmnCode=TESTTMN
vnpay.hashSecret=TESTHASH
vnpay.url=http://localhost
vnpay.returnUrl=http://localhost/callback
vnpay.appointmentReturnUrl=http://localhost/appointment-callback

# Test Email
spring.mail.username=test@test.com
spring.mail.password=test

# Test App
app.frontend.url=http://localhost:5173
app.cors.allowed-origins=*

# Disable Actuator in tests
management.endpoints.enabled-by-default=false
