services:
  # Backend Service
  - type: web
    name: doctor-booking-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /api/public/health
    envVars:
      # Do NOT set PORT — Render injects it automatically; hardcoding breaks routing
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 86400000
      - key: JWT_REFRESH_EXPIRATION
        value: 604800000
      - key: GROQ_API_KEY
        sync: false
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_HASH_SECRET
        sync: false
      - key: VNPAY_URL
        value: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - key: VNPAY_RETURN_URL
        sync: false
      - key: VNPAY_APPOINTMENT_RETURN_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: MANAGEMENT_HEALTH_MAIL_ENABLED
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: doctor-booking-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRONTEND_URL
        fromService:
          type: web
          name: doctor-booking-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # Frontend Service
  - type: web
    name: doctor-booking-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    envVars:
      # Baked at build time — browser calls same-origin /api; nginx proxies to backend
      - key: VITE_API_BASE_URL
        value: /api
      # Runtime nginx proxy target (envsubst on container start)
      - key: VITE_API_TARGET
        fromService:
          type: web
          name: doctor-booking-backend
          envVarKey: RENDER_EXTERNAL_URL

