# .github/workflows/deploy-production.yml
# ══════════════════════════════════════════════════════════════
# Deploy to Production — Auto-triggers when code is merged into main
#
# Pipeline:
#   1. Trigger Render Deploy Hooks (backend + frontend)
#   2. Wait for deployment
#   3. Health check production URL
#   4. Notify on failure
# ══════════════════════════════════════════════════════════════

name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger for scheduled/emergency deploys

jobs:
  deploy:
    name: Deploy to Render Production
    runs-on: ubuntu-latest
    # GitHub Environment with protection rules (optional: require approval)
    environment: production
    steps:
      - name: Trigger Backend Deploy
        run: |
          echo "🚀 Deploying backend to production..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_PROD_BACKEND_HOOK }}")
          echo "  Render backend hook response: HTTP $HTTP_CODE"

      - name: Trigger Frontend Deploy
        run: |
          echo "🚀 Deploying frontend to production..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_PROD_FRONTEND_HOOK }}")
          echo "  Render frontend hook response: HTTP $HTTP_CODE"

      - name: Wait for Deployment (180s)
        run: |
          echo "Waiting 180 seconds for Render to build and deploy (free tier)..."
          sleep 180

      - name: Health Check — Production Backend
        run: |
          PROD_URL="${{ secrets.PRODUCTION_URL }}"
          PROD_URL="${PROD_URL:-https://doctor-booking-backend-yjpf.onrender.com}"
          HEALTH_URL="${PROD_URL%/}/api/public/health"

          echo "Checking production health at: ${HEALTH_URL}"
          for i in $(seq 1 45); do
            HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" "${HEALTH_URL}" || echo "000")
            RESP=$(cat /tmp/health.json 2>/dev/null || echo "")
            echo "  Attempt $i: HTTP ${HTTP_CODE}"
            if [ "$HTTP_CODE" = "200" ] && echo "$RESP" | grep -qiE '"status"[[:space:]]*:[[:space:]]*"UP"|"UP"'; then
              echo "✅ Production backend is healthy"
              cat /tmp/health.json
              exit 0
            fi
            sleep 10
          done
          echo "❌ Production health check failed after ~7.5 minutes"
          cat /tmp/health.json 2>/dev/null || true
          exit 1

      - name: Health Check — Production Frontend
        run: |
          PROD_FE_URL="${{ secrets.PRODUCTION_FRONTEND_URL }}"
          if [ -n "$PROD_FE_URL" ]; then
            echo "Checking frontend at: ${PROD_FE_URL}"
            curl -sf "$PROD_FE_URL" > /dev/null && echo "✅ Frontend is live" || echo "⚠️ Frontend check inconclusive"
          else
            echo "ℹ️ PRODUCTION_FRONTEND_URL not set, skipping frontend health check"
          fi
