name: SonarQube Analysis and Jira Bug Reporter

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# ─── Shared constants ────────────────────────────────────────────────────────
env:
  JIRA_PROJECT_KEY: 'SCRUM'
  JIRA_URL: 'https://huynhphongdat2005.atlassian.net'
  SONAR_PROJECT_KEY: 'ptdat30_Test_DoctorBooking_2026'
  SONAR_ORG: 'ptdat30'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1: SonarCloud Scan + Quality Gate
  # ══════════════════════════════════════════════════════════════════════════
  sonar-scan:
    name: SonarCloud Scan & Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile Backend Code
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean compile

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.jasmin.internal.disabled=true
            -Dsonar.js.analyzeSecurity=false
            -Dsonar.javascript.node.maxspace=4096

      - name: SonarCloud Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2: Import TOP 10 HIGH SonarCloud issues → individual Jira tasks
  #   - Dedup bằng JQL label search (sonar-{issueKey})
  #   - Assign vào Sprint đang chạy
  #   - Transition: TO DO → TESTING → BUG FOUND
  # ══════════════════════════════════════════════════════════════════════════
  sync-jira:
    name: Sync SonarCloud Issues to Jira
    runs-on: ubuntu-latest
    needs: sonar-scan
    if: always()   # Chạy kể cả khi Quality Gate fail
    env:
      JIRA_USER: ${{ secrets.JIRA_USER }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Import SonarCloud HIGH Issues as Individual Jira Tasks
        run: |
          SONAR_API="https://sonarcloud.io/api/issues/search"
          JIRA_BASE="${{ env.JIRA_URL }}"
          JIRA_ISSUE_API="${JIRA_BASE}/rest/api/2/issue"
          JIRA_SEARCH_API="${JIRA_BASE}/rest/api/2/issue/picker"
          JIRA_AGILE_API="${JIRA_BASE}/rest/agile/1.0"
          MAX_ISSUES=10

          echo "========================================================"
          echo "[1/5] Fetching TOP ${MAX_ISSUES} HIGH impact issues from SonarCloud..."
          echo "========================================================"

          SONAR_RESP=$(curl -s \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            "${SONAR_API}?componentKeys=${{ env.SONAR_PROJECT_KEY }}&impactSeverities=HIGH&resolved=false&ps=${MAX_ISSUES}&p=1")

          TOTAL=$(echo "$SONAR_RESP" | jq '.total // 0')
          echo "Total HIGH issues on SonarCloud: $TOTAL"

          ISSUE_COUNT=$(echo "$SONAR_RESP" | jq '.issues | length')
          echo "Processing top ${ISSUE_COUNT} issues (max ${MAX_ISSUES})..."

          if [ "$ISSUE_COUNT" -eq 0 ]; then
            echo "No HIGH issues found. Nothing to sync."
            exit 0
          fi

          echo "========================================================"
          echo "[2/5] Auto-detecting active Sprint ID for project ${{ env.JIRA_PROJECT_KEY }}..."
          echo "========================================================"

          # Lấy board ID của project SCRUM
          BOARD_RESP=$(curl -s \
            -H "Content-Type: application/json" \
            -u "$JIRA_USER:$JIRA_API_TOKEN" \
            "${JIRA_AGILE_API}/board?projectKeyOrId=${{ env.JIRA_PROJECT_KEY }}&type=scrum")

          BOARD_ID=$(echo "$BOARD_RESP" | jq -r '.values[0].id // empty')

          ACTIVE_SPRINT_ID=""
          if [ -n "$BOARD_ID" ]; then
            SPRINT_RESP=$(curl -s \
              -H "Content-Type: application/json" \
              -u "$JIRA_USER:$JIRA_API_TOKEN" \
              "${JIRA_AGILE_API}/board/${BOARD_ID}/sprint?state=active")
            ACTIVE_SPRINT_ID=$(echo "$SPRINT_RESP" | jq -r '.values[0].id // empty')
          fi

          if [ -n "$ACTIVE_SPRINT_ID" ]; then
            echo "Found active Sprint ID: ${ACTIVE_SPRINT_ID} (Board ID: ${BOARD_ID})"
          else
            echo "WARNING: No active sprint found. Issues will be created without sprint assignment."
          fi

          echo "========================================================"
          echo "[3/5] Processing each issue: dedup → create → transition..."
          echo "========================================================"

          CREATED=0
          SKIPPED=0

          # Loop qua từng issue (dùng index để tránh subshell problem)
          ISSUE_KEYS=$(echo "$SONAR_RESP" | jq -r '.issues[].key')

          for SONAR_KEY in $ISSUE_KEYS; do
            # Lấy chi tiết issue
            ISSUE_JSON=$(echo "$SONAR_RESP" | jq --arg k "$SONAR_KEY" '.issues[] | select(.key == $k)')
            MSG=$(echo "$ISSUE_JSON" | jq -r '.message // "No description"')
            COMPONENT=$(echo "$ISSUE_JSON" | jq -r '.component // ""')
            RULE=$(echo "$ISSUE_JSON" | jq -r '.rule // ""')
            SEVERITY=$(echo "$ISSUE_JSON" | jq -r '.severity // "HIGH"')

            # Tách filename từ component (format: projectKey:path/to/File.java)
            FILENAME=$(echo "$COMPONENT" | cut -d':' -f2)

            echo ""
            echo "──────────────────────────────────────────────"
            echo "Processing: ${SONAR_KEY}"
            echo "  Message : ${MSG}"
            echo "  File    : ${FILENAME}"

            # ── DEDUP: Tìm Jira issue có label sonar-{SONAR_KEY} ─────────────
            DEDUP_LABEL="sonar-${SONAR_KEY}"
            JQL="project = ${{ env.JIRA_PROJECT_KEY }} AND labels = \"${DEDUP_LABEL}\" AND statusCategory != Done"
            JQL_ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${JQL}'))")

            SEARCH_RESP=$(curl -s \
              -H "Content-Type: application/json" \
              -u "$JIRA_USER:$JIRA_API_TOKEN" \
              "${JIRA_BASE}/rest/api/2/search?jql=${JQL_ENCODED}&maxResults=1&fields=key,summary,status")

            EXISTING_COUNT=$(echo "$SEARCH_RESP" | jq '.total // 0')

            if [ "$EXISTING_COUNT" -gt 0 ]; then
              EXISTING_KEY=$(echo "$SEARCH_RESP" | jq -r '.issues[0].key')
              echo "  SKIP: Already exists as ${EXISTING_KEY}"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            echo "  Creating new Jira task..."

            # ── BUILD PAYLOAD ─────────────────────────────────────────────────
            # Description ngắn gọn: file + rule + link
            SONAR_ISSUE_URL="https://sonarcloud.io/project/issues?id=${{ env.SONAR_PROJECT_KEY }}&open=${SONAR_KEY}"
            SHORT_FILE=$(basename "$FILENAME")
            DESCRIPTION="*File:* ${SHORT_FILE}\n*Rule:* ${RULE}\n*SonarCloud:* [View Issue|${SONAR_ISSUE_URL}]"

            SUMMARY="[HIGH] $(echo "$MSG" | cut -c1-90) (${SHORT_FILE})"

            # Tạo payload KHÔNG có sprint (sprint assign dùng Agile API riêng sau khi tạo)
            PAYLOAD=$(jq -n \
              --arg project "${{ env.JIRA_PROJECT_KEY }}" \
              --arg summary "$SUMMARY" \
              --arg description "$DESCRIPTION" \
              --arg dedup_label "$DEDUP_LABEL" \
              '{
                "fields": {
                  "project": { "key": $project },
                  "issuetype": { "name": "Bug" },
                  "summary": $summary,
                  "description": $description,
                  "priority": { "name": "High" },
                  "labels": ["sonarcloud", "auto-import", $dedup_label]
                }
              }')

            # ── CREATE JIRA ISSUE ──────────────────────────────────────────────
            CREATE_RESP=$(curl -s -X POST \
              -H "Content-Type: application/json" \
              -u "$JIRA_USER:$JIRA_API_TOKEN" \
              -d "$PAYLOAD" \
              "${JIRA_ISSUE_API}")

            JIRA_KEY=$(echo "$CREATE_RESP" | jq -r '.key // empty')

            if [ -z "$JIRA_KEY" ]; then
              echo "  ERROR: Failed to create Jira issue."
              echo "  Response: $(echo "$CREATE_RESP" | jq -c '.')"
              sleep 1
              continue
            fi

            echo "  CREATED: ${JIRA_KEY} → ${JIRA_BASE}/browse/${JIRA_KEY}"
            CREATED=$((CREATED + 1))

            # ── ASSIGN VÀO SPRINT (Agile API) ────────────────────────────────
            # Dùng POST /sprint/{id}/issue thay vì customfield_10020 (tin cậy hơn)
            if [ -n "$ACTIVE_SPRINT_ID" ]; then
              SPRINT_ASSIGN=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                -H "Content-Type: application/json" \
                -u "$JIRA_USER:$JIRA_API_TOKEN" \
                -d "{\"issues\": [\"${JIRA_KEY}\"]}" \
                "${JIRA_AGILE_API}/sprint/${ACTIVE_SPRINT_ID}/issue")
              if [ "$SPRINT_ASSIGN" = "204" ]; then
                echo "  Sprint assign: ${JIRA_KEY} → Sprint ${ACTIVE_SPRINT_ID} ✓ (will show on board)"
              else
                echo "  Sprint assign: HTTP ${SPRINT_ASSIGN} (check Agile API permissions)"
              fi
            fi

            # ── TRANSITION: TO DO → TESTING → BUG FOUND ──────────────────────
            # Bước A: Start Work (TO DO → TESTING)
            sleep 1  # Cho Jira khởi tạo issue xong

            TRANS_RESP_A=$(curl -s \
              -H "Content-Type: application/json" \
              -u "$JIRA_USER:$JIRA_API_TOKEN" \
              "${JIRA_BASE}/rest/api/2/issue/${JIRA_KEY}/transitions")

            START_WORK_ID=$(echo "$TRANS_RESP_A" | jq -r '
              .transitions[] | select(.name | test("Start Work|Start"; "i")) | .id
            ' | head -1)

            if [ -n "$START_WORK_ID" ]; then
              curl -s -X POST \
                -H "Content-Type: application/json" \
                -u "$JIRA_USER:$JIRA_API_TOKEN" \
                -d "{\"transition\":{\"id\":\"${START_WORK_ID}\"}}" \
                "${JIRA_BASE}/rest/api/2/issue/${JIRA_KEY}/transitions" > /dev/null
              echo "  Transition A: TO DO → TESTING ✓"
            else
              echo "  WARNING: 'Start Work' transition not found. Skipping transition."
              sleep 0.5
              continue
            fi

            sleep 1

            # Bước B: Bug Found (TESTING → BUG FOUND)
            TRANS_RESP_B=$(curl -s \
              -H "Content-Type: application/json" \
              -u "$JIRA_USER:$JIRA_API_TOKEN" \
              "${JIRA_BASE}/rest/api/2/issue/${JIRA_KEY}/transitions")

            BUG_FOUND_ID=$(echo "$TRANS_RESP_B" | jq -r '
              .transitions[] | select(.name | test("Bug Found|BUG FOUND"; "i")) | .id
            ' | head -1)

            if [ -n "$BUG_FOUND_ID" ]; then
              curl -s -X POST \
                -H "Content-Type: application/json" \
                -u "$JIRA_USER:$JIRA_API_TOKEN" \
                -d "{\"transition\":{\"id\":\"${BUG_FOUND_ID}\"}}" \
                "${JIRA_BASE}/rest/api/2/issue/${JIRA_KEY}/transitions" > /dev/null
              echo "  Transition B: TESTING → BUG FOUND ✓"
              echo "  STATUS: ${JIRA_KEY} is now visible on the board as BUG FOUND 🐛"
            else
              echo "  WARNING: 'Bug Found' transition not found from TESTING."
              echo "  Task ${JIRA_KEY} is in TESTING. Transition manually if needed."
            fi

            sleep 0.5  # Rate limiting: tránh spam Jira API
          done

          echo ""
          echo "========================================================"
          echo "[5/5] Summary"
          echo "========================================================"
          echo "  Total HIGH issues on SonarCloud : $TOTAL"
          echo "  Issues processed this run       : $ISSUE_COUNT"
          echo "  New Jira tasks created          : $CREATED"
          echo "  Skipped (already exists)        : $SKIPPED"
          echo "========================================================"


  # ══════════════════════════════════════════════════════════════════════════
  # JOB 3: Auto Fix Checker
  #   Đọc commit message, extract Jira keys (SCRUM-\d+)
  #   Kiểm tra SonarCloud xem issue đã resolved chưa
  #   Nếu resolved → transition Jira sang DONE
  #   Nếu chưa → thêm comment vào Jira
  # ══════════════════════════════════════════════════════════════════════════
  check-fixes:
    name: Auto Fix Checker (Commit → SonarCloud → Jira)
    runs-on: ubuntu-latest
    # Chỉ chạy khi push trực tiếp (không chạy trên PR để tránh duplicate)
    if: github.event_name == 'push'
    env:
      JIRA_USER: ${{ secrets.JIRA_USER }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Check Commit Message for Jira Keys and Verify Fixes
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          JIRA_BASE="${{ env.JIRA_URL }}"
          SONAR_API="https://sonarcloud.io/api/issues/search"

          echo "========================================================"
          echo "[1/5] Analyzing commit message for Jira issue references..."
          echo "========================================================"
          echo "Commit: ${COMMIT_MSG}"

          # Extract tất cả SCRUM-\d+ patterns từ commit message
          # Hỗ trợ format: SCRUM-5, [SCRUM-5], fix: SCRUM-5, fix(scope): [SCRUM-5]
          JIRA_KEYS=$(echo "$COMMIT_MSG" | grep -oE '(SCRUM|${{ env.JIRA_PROJECT_KEY }})-[0-9]+' | sort -u)

          if [ -z "$JIRA_KEYS" ]; then
            echo "No Jira issue keys found in commit message. Nothing to check."
            echo ""
            echo "TIP: To trigger auto-fix checking, include Jira key in commit:"
            echo "  fix: [SCRUM-5] remove duplicate timestamp literal"
            exit 0
          fi

          echo "Found Jira keys: $JIRA_KEYS"

          echo "========================================================"
          echo "[2-5/5] Processing each Jira key..."
          echo "========================================================"

          for JIRA_KEY in $JIRA_KEYS; do
            echo ""
            echo "──────────────────────────────────────────────"
            echo "Checking ${JIRA_KEY}..."

            # Lấy labels của Jira issue để tìm sonar issue key
            JIRA_DETAIL=$(curl -s \
              -H "Content-Type: application/json" \
              -u "$JIRA_USER:$JIRA_API_TOKEN" \
              "${JIRA_BASE}/rest/api/2/issue/${JIRA_KEY}?fields=labels,status,summary")

            JIRA_STATUS=$(echo "$JIRA_DETAIL" | jq -r '.fields.status.name // "unknown"')
            echo "  Current Jira Status: ${JIRA_STATUS}"

            # Extract sonar issue key từ labels (format: sonar-AY12345xyz)
            SONAR_KEY=$(echo "$JIRA_DETAIL" | jq -r '
              .fields.labels[] | select(startswith("sonar-")) | ltrimstr("sonar-")
            ' | head -1)

            if [ -z "$SONAR_KEY" ]; then
              echo "  INFO: No sonar-* label found on ${JIRA_KEY}. Skipping SonarCloud check."
              echo "  (This may be a manually created task, not from auto-import)"
              continue
            fi

            echo "  SonarCloud Issue Key: ${SONAR_KEY}"

            # Kiểm tra issue đã resolved trong SonarCloud chưa
            SONAR_CHECK=$(curl -s \
              -H "Authorization: Bearer $SONAR_TOKEN" \
              "${SONAR_API}?issues=${SONAR_KEY}&ps=1")

            SONAR_TOTAL=$(echo "$SONAR_CHECK" | jq '.total // -1')
            SONAR_STATUS=$(echo "$SONAR_CHECK" | jq -r '.issues[0].status // "unknown"')
            SONAR_RESOLUTION=$(echo "$SONAR_CHECK" | jq -r '.issues[0].resolution // "none"')

            echo "  SonarCloud Status: ${SONAR_STATUS} | Resolution: ${SONAR_RESOLUTION}"

            # SonarCloud issue được coi là fixed nếu: total=0 (không còn) hoặc status=RESOLVED/CLOSED
            IS_FIXED=false
            if [ "$SONAR_TOTAL" -eq 0 ]; then
              IS_FIXED=true
              echo "  RESULT: Issue NOT found in SonarCloud (total=0) → FIXED ✅"
            elif echo "$SONAR_STATUS" | grep -qiE "RESOLVED|CLOSED"; then
              IS_FIXED=true
              echo "  RESULT: Issue is RESOLVED in SonarCloud → FIXED ✅"
            else
              echo "  RESULT: Issue still OPEN in SonarCloud → NOT fixed yet ❌"
            fi

            if [ "$IS_FIXED" = "true" ]; then
              # ── TRANSITION TO DONE ──────────────────────────────────────────
              # Workflow: BUG FOUND --(Start Fixing)--> FIXING --(Fixed)--> RE-TESTING --(Pass)--> DONE
              echo "  Transitioning ${JIRA_KEY} toward DONE..."

              # Lấy transitions hiện tại
              TRANS_NOW=$(curl -s \
                -H "Content-Type: application/json" \
                -u "$JIRA_USER:$JIRA_API_TOKEN" \
                "${JIRA_BASE}/rest/api/2/issue/${JIRA_KEY}/transitions")

              echo "  Available transitions:"
              echo "$TRANS_NOW" | jq -r '.transitions[] | "    ID: \(.id) | \(.name)"'

              # Hàm helper: tìm và thực hiện transition theo tên
              perform_transition() {
                local PATTERN="$1"
                local LABEL="$2"
                local TRANS_LIST="$3"

                local TID=$(echo "$TRANS_LIST" | jq -r --arg p "$PATTERN" '
                  .transitions[] | select(.name | test($p; "i")) | .id
                ' | head -1)

                if [ -n "$TID" ]; then
                  curl -s -X POST \
                    -H "Content-Type: application/json" \
                    -u "$JIRA_USER:$JIRA_API_TOKEN" \
                    -d "{\"transition\":{\"id\":\"${TID}\"}}" \
                    "${JIRA_BASE}/rest/api/2/issue/${JIRA_KEY}/transitions" > /dev/null
                  echo "  ✓ Transitioned: ${LABEL}"
                  return 0
                fi
                return 1
              }

              # Thực hiện các transition theo thứ tự workflow:
              # BUG FOUND → FIXING → RE-TESTING → DONE
              # (mỗi bước: fetch lại transitions vì trạng thái đã đổi)

              STEP=1
              MAX_STEPS=4

              while [ $STEP -le $MAX_STEPS ]; do
                CURRENT_TRANS=$(curl -s \
                  -H "Content-Type: application/json" \
                  -u "$JIRA_USER:$JIRA_API_TOKEN" \
                  "${JIRA_BASE}/rest/api/2/issue/${JIRA_KEY}/transitions")

                CURRENT_STATUS=$(curl -s \
                  -H "Content-Type: application/json" \
                  -u "$JIRA_USER:$JIRA_API_TOKEN" \
                  "${JIRA_BASE}/rest/api/2/issue/${JIRA_KEY}?fields=status" | jq -r '.fields.status.name')

                echo "  [Step $STEP] Current status: ${CURRENT_STATUS}"

                # Tìm transition phù hợp theo trạng thái hiện tại
                case "$CURRENT_STATUS" in
                  "BUG FOUND"|"Bug Found")
                    perform_transition "Start Fix|Start Fixing|Fixing" "BUG FOUND → FIXING" "$CURRENT_TRANS" || break
                    ;;
                  "FIXING"|"Fixing"|"In Progress")
                    perform_transition "Fixed|Mark.*Fixed|Done.*Fix" "FIXING → RE-TESTING" "$CURRENT_TRANS" || break
                    ;;
                  "RE-TESTING"|"Re-testing"|"Re Testing")
                    perform_transition "Pass|Done|Resolve|Close" "RE-TESTING → DONE" "$CURRENT_TRANS" || break
                    ;;
                  "DONE"|"Done"|"Closed"|"Resolved")
                    echo "  ✓ ${JIRA_KEY} already in DONE/final state. No transition needed."
                    break
                    ;;
                  *)
                    echo "  INFO: Unexpected status '${CURRENT_STATUS}'. Trying generic Done transition..."
                    perform_transition "Done|Close|Resolve|Pass" "→ DONE" "$CURRENT_TRANS" || break
                    ;;
                esac

                sleep 1
                STEP=$((STEP + 1))
              done

              # Thêm comment vào Jira
              COMMENT_BODY="✅ *Auto Fix Verified* by GitHub Actions\n\nSonarCloud issue *${SONAR_KEY}* has been resolved.\n\n* Commit: [${GITHUB_SHA:0:7}|${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}]\n* Commit message: ${COMMIT_MSG}\n* SonarCloud: Issue no longer detected\n\n_Status automatically updated to DONE by CI/CD pipeline._"

              jq -n --arg body "$COMMENT_BODY" '{"body": $body}' > /tmp/comment.json
              curl -s -X POST \
                -H "Content-Type: application/json" \
                -u "$JIRA_USER:$JIRA_API_TOKEN" \
                -d @/tmp/comment.json \
                "${JIRA_BASE}/rest/api/2/issue/${JIRA_KEY}/comment" > /dev/null

              echo "  Comment added to ${JIRA_KEY} ✓"

            else
              # ── ISSUE STILL OPEN: add warning comment ─────────────────────
              COMMENT_BODY="⚠️ *Fix Not Yet Verified* — GitHub Actions Check\n\nCommit [${GITHUB_SHA:0:7}|${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}] references this issue but SonarCloud still detects it as *OPEN*.\n\n* SonarCloud Key: ${SONAR_KEY}\n* SonarCloud Status: ${SONAR_STATUS}\n* Commit: ${COMMIT_MSG}\n\n_Please ensure the fix is complete and the code has been re-scanned by SonarCloud._"

              jq -n --arg body "$COMMENT_BODY" '{"body": $body}' > /tmp/comment.json
              curl -s -X POST \
                -H "Content-Type: application/json" \
                -u "$JIRA_USER:$JIRA_API_TOKEN" \
                -d @/tmp/comment.json \
                "${JIRA_BASE}/rest/api/2/issue/${JIRA_KEY}/comment" > /dev/null

              echo "  Warning comment added to ${JIRA_KEY} ✓"
            fi

            sleep 0.5
          done

          echo ""
          echo "========================================================"
          echo "Fix check complete."
          echo "========================================================"
