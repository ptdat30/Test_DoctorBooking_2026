name: CI Pipeline

on:
  push:
    branches: [staging, main]
    paths-ignore:
      - 'docs/**'
      - '*.xlsx'
      - '*.png'
      - '*.dtd'
  pull_request:
    branches: [staging, main]
    paths-ignore:
      - 'docs/**'
      - '*.xlsx'
      - '*.png'
      - '*.dtd'

# Hủy các lần chạy cũ trên cùng một nhánh/PR để tiết kiệm runner
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DB_URL: jdbc:mysql://127.0.0.1:3306/doctor_booking
  DB_USERNAME: root
  DB_PASSWORD: root
  JWT_SECRET: ci-test-secret-key-minimum-256-bits-long-for-jwt-signing
  JWT_EXPIRATION: '86400000'
  JWT_REFRESH_EXPIRATION: '604800000'
  SMTP_HOST: smtp.gmail.com
  SMTP_PORT: '587'
  SMTP_USERNAME: ci-test@example.com
  SMTP_PASSWORD: ci-test-password
  GROQ_API_KEY: ci-test-key
  VNPAY_TMN_CODE: TESTTMN
  VNPAY_HASH_SECRET: TESTHASH
  VNPAY_URL: http://localhost
  VNPAY_RETURN_URL: http://localhost/callback
  VNPAY_APPOINTMENT_RETURN_URL: http://localhost/appointment-callback
  CORS_ALLOWED_ORIGINS: '*'
  FRONTEND_URL: http://localhost:5173
  EMAIL_FROM: noreply@doctorbooking.com
  SKIP_AI_TESTS: 'true'
  SEED_TEST_DATA: 'true'

jobs:
  # ── Job 0: Path Filtering ────────────────────────────────────
  filter:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      postman: ${{ steps.changes.outputs.postman }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
              - 'sonar-project.properties'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            postman:
              - 'postman/**'
              - '.github/workflows/ci.yml'

  # ── Job 1: Backend Build, Test & Coverage ────────────────────
  backend-build:
    name: "Backend: Build, Test & Coverage"
    runs-on: ubuntu-latest
    needs: filter
    if: ${{ needs.filter.outputs.backend == 'true' || needs.filter.outputs.frontend == 'true' || needs.filter.outputs.postman == 'true' }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: doctor_booking
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build + Unit/Integration Test (JaCoCo)
        working-directory: backend
        run: |
          chmod +x mvnw

          echo "Waiting for MySQL to be ready..."
          for i in $(seq 1 60); do
            if mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root -proot -e "SELECT 1;" > /dev/null 2>&1; then
              echo "MySQL is ready (attempt $i)"
              mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root -proot -e "CREATE DATABASE IF NOT EXISTS doctor_booking;"
              break
            fi
            echo "Waiting for MySQL... (attempt $i/60)"
            sleep 2
          done

          ./mvnw clean verify -B --no-transfer-progress

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Upload Backend Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-artifacts
          path: |
            backend/target/*.jar
            backend/target/classes/
            backend/target/site/jacoco/
          retention-days: 1

  # ── Job 2: Frontend Build ────────────────────────────────────
  frontend-build:
    name: "Frontend: Build"
    runs-on: ubuntu-latest
    needs: filter
    if: ${{ needs.filter.outputs.frontend == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci --prefer-offline --no-audit --no-fund
          npm run build

  # ── Job 3: SonarCloud Quality Gate ───────────────────────────
  sonar-gate:
    name: "SonarCloud: Scan & Quality Gate"
    runs-on: ubuntu-latest
    needs: [filter, backend-build]
    if: ${{ needs.filter.outputs.backend == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Backend Classes & Coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-build-artifacts
          path: backend/target

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.jasmin.internal.disabled=true
            -Dsonar.js.analyzeSecurity=false
            -Dsonar.javascript.node.maxspace=4096

      - name: Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Job 4: API Integration — Newman ──────────────────────────
  integration-test:
    name: "Integration: Newman API Tests"
    runs-on: ubuntu-latest
    needs: [filter, backend-build]
    if: ${{ needs.filter.outputs.backend == 'true' || needs.filter.outputs.postman == 'true' }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: doctor_booking
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-build-artifacts
          path: backend/target

      - name: Wait for MySQL
        run: |
          echo "Waiting for MySQL to be ready..."
          for i in $(seq 1 60); do
            if mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root -proot -e "SELECT 1;" > /dev/null 2>&1; then
              echo "MySQL is ready"
              mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root -proot -e "CREATE DATABASE IF NOT EXISTS doctor_booking;"
              break
            fi
            sleep 2
          done

      - name: Start Backend
        run: |
          java -jar backend/target/backend-0.0.1-SNAPSHOT.jar &
          echo $! > backend.pid

      - name: Wait for API Health
        run: npx wait-on http-get://localhost:8080/api/public/health --timeout 60000

      - name: Run Newman — All 23 Folders
        run: |
          cd postman/test_doctor_booking_2026
          mkdir -p reports

          cp test_doctor_booking_2026.postman_environment.json /tmp/ci-env.json
          node -e "
            const fs = require('fs');
            const env = JSON.parse(fs.readFileSync('/tmp/ci-env.json','utf8'));
            env.values.forEach(v => {
              if(v.key==='base_url') v.value='http://localhost:8080';
              if(v.key==='skip_ai_tests') v.value='true';
            });
            fs.writeFileSync('/tmp/ci-env.json', JSON.stringify(env,null,2));
          "

          FOLDERS=(
            "00_Setup" "01_Public" "02_Auth"
            "03_Patient_Profile" "04_Patient_Doctors"
            "05_Patient_Appointments" "06_Patient_Treatments"
            "07_Patient_Feedbacks" "08_Patient_FamilyMembers"
            "09_Patient_Wallet_Payments" "10_Patient_AI"
            "11_Patient_Notifications" "12_Doctor_Profile"
            "13_Doctor_Appointments" "14_Doctor_Treatments"
            "15_Doctor_Patients" "16_Doctor_Medications_Feedbacks"
            "17_Admin_Doctors" "18_Admin_Patients"
            "19_Admin_Appointments" "20_Admin_Feedbacks"
            "21_Admin_Users" "22_E2E_Flows"
          )

          FAILED=0
          PASSED=0
          FAILED_NAMES=""

          for folder in "${FOLDERS[@]}"; do
            echo ""
            echo "══════════════════════════════════════════"
            echo "  Running: $folder"
            echo "══════════════════════════════════════════"

            npx newman run test_doctor_booking_2026.postman_collection.json \
              -e /tmp/ci-env.json \
              --folder "$folder" \
              --timeout-request 15000 \
              --delay-request 200 \
              --reporters cli,json \
              --reporter-json-export "reports/ci-${folder}.json" \
              --export-environment /tmp/ci-env.json

            if [ $? -ne 0 ]; then
              echo "  ❌ FAILED: $folder"
              FAILED=$((FAILED + 1))
              FAILED_NAMES="${FAILED_NAMES} ${folder}"
            else
              echo "  ✅ PASSED: $folder"
              PASSED=$((PASSED + 1))
            fi
          done

          echo ""
          echo "══════════════════════════════════════════"
          echo "  NEWMAN SUMMARY"
          echo "══════════════════════════════════════════"
          echo "  Passed: $PASSED"
          echo "  Failed: $FAILED"
          if [ $FAILED -gt 0 ]; then
            echo "  Failed folders: $FAILED_NAMES"
          fi
          echo "══════════════════════════════════════════"

          exit $FAILED

      - name: Upload Newman Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-ci-reports
          path: postman/test_doctor_booking_2026/reports/ci-*.json
          retention-days: 7

      - name: Stop Backend
        if: always()
        run: kill $(cat backend.pid) 2>/dev/null || true

  # ── Job 5: E2E — CodeceptJS + Playwright ─────────────────────
  # PR: chỉ chạy @smoke (phản hồi nhanh). Push staging/main: chạy full suite.
  # Tái dùng JAR từ backend-build (không biên dịch lại backend).
  e2e-test:
    name: "E2E: CodeceptJS + Playwright"
    runs-on: ubuntu-latest
    needs: [filter, backend-build]
    if: ${{ needs.filter.outputs.backend == 'true' || needs.filter.outputs.frontend == 'true' }}
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: doctor_booking
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Download Backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-build-artifacts
          path: backend/target

      - name: Start Backend (background)
        env:
          FRONTEND_URL: http://localhost:4173
        run: |
          for i in $(seq 1 60); do
            if mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root -proot -e "SELECT 1;" > /dev/null 2>&1; then
              mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root -proot -e "CREATE DATABASE IF NOT EXISTS doctor_booking;"
              break
            fi
            sleep 2
          done

          java -jar backend/target/backend-0.0.1-SNAPSHOT.jar &
          echo $! > backend.pid

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build Frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8080/api
        run: npm run build

      - name: Start Frontend Preview Server (background)
        working-directory: frontend
        run: |
          npm run preview -- --port 4173 &
          echo $! > ../frontend.pid

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Wait for Servers
        run: |
          npx wait-on \
            http://localhost:4173 \
            http-get://localhost:8080/api/public/health \
            --timeout 120000 \
            --interval 2000 \
            --verbose

      - name: Run E2E (smoke on PR/staging, full on main)
        working-directory: frontend
        env:
          TEST_BASE_URL: http://localhost:4173
          TEST_API_URL: http://localhost:8080/api
          TEST_ADMIN_USERNAME: admin
          TEST_ADMIN_PASSWORD: ${{ secrets.CI_TEST_ADMIN_PASSWORD || 'Admin@123' }}
          HEADLESS: 'true'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            echo "PR/staging → chạy E2E @smoke"
            npm run e2e:smoke
          else
            echo "main → chạy full E2E"
            npm run e2e:headless
          fi

      - name: Upload E2E Artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: frontend/e2e/output/
          retention-days: 7

      - name: Stop Servers
        if: always()
        run: |
          kill $(cat backend.pid) 2>/dev/null || true
          kill $(cat frontend.pid) 2>/dev/null || true
