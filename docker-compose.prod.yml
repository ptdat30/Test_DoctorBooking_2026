# ══════════════════════════════════════════════════════════════
# docker-compose.prod.yml — Production Environment Override
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Overrides:
#   - Backend: Aiven Cloud production DB, structured JSON logging
#   - Frontend: production API target
# ══════════════════════════════════════════════════════════════

services:

  backend:
    env_file:
      - .env.production
    environment:
      # Production database on Aiven Cloud
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      # Structured JSON logging for production log aggregation
      SPRING_LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
      # Disable JPA open-in-view warning
      SPRING_JPA_OPEN_IN_VIEW: "false"
      # Disable mail health indicator — SMTP is external
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    environment:
      VITE_API_TARGET: ${VITE_API_TARGET:-http://backend:8080}
    ports:
      - "${FRONTEND_PORT:-80}:8080"
