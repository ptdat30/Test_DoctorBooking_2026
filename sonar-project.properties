sonar.organization=ptdat30
sonar.projectKey=ptdat30_Test_DoctorBooking_2026
sonar.projectName=Test_DoctorBooking_2026

# Path to the source directories (Java only - exclude frontend to prevent JsSecuritySensorV2 hang)
sonar.sources=backend/src/main/java

# Java compiled classes directory (mandatory for SonarQube analysis on Java projects)
sonar.java.binaries=backend/target/classes

# Exclusions (optional but recommended for faster analysis)
sonar.exclusions=**/node_modules/**, **/dist/**, **/.git/**, **/target/**, **/bin/**, **/postman/**, **/*.png, **/*.jpg, **/*.jpeg, **/*.gif, **/*.svg, **/*.mp4, **/*.html, backend/src/test/**, frontend/src/assets/**

# Optimize JavaScript/TypeScript Analysis to prevent hangs
# Allocate more memory for Node.js process (4GB) used by Sonar JS/TS analyzer
sonar.javascript.node.maxspace=4096
# If JsSecuritySensorV2 hangs indefinitely, disable the JS security rules engine
sonar.js.analyzeSecurity=false
sonar.jasmin.internal.disabled=true
